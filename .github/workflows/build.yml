name: Build Fedora Silverblue

on:
  push:
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "45 00 * * 3"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - id: checkout-code
        name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - id: install-cosign
        name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - id: log-into-ghcr
        name: Log into Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: load-config
        name: Load Config
        run: |
          set -euxo pipefail

          CONFIG_FILE="config/daedalus"
          if [ -f "$CONFIG_FILE" ]; then
            # Read values from configuration.
            BASE_IMAGE=$(jq -r '.base_image' $CONFIG_FILE)
            BASE_IMAGE_TAG=$(jq -r '.base_image_tag' $CONFIG_FILE)

            # Output parsed values
            echo "base_image=$BASE_IMAGE" >> $GITHUB_OUTPUT
            echo "base_image_tag=$BASE_IMAGE_TAG" >> $GITHUB_OUTPUT

            echo "Config loaded from $CONFIG_FILE"
          else
            echo "Error: $CONFIG_FILE not found."
          fi

      - id: check-stable
        name: Check Stable Version
        continue-on-error: true
        run: |
          set -euxo pipefail

          # No stable tag. Stable considered penultimate major version.
          STABLE_REPO="quay.io/fedora-ostree-desktops/silverblue:stable"
          STABLE_MAJOR=$(skopeo inspect docker://$STABLE_REPO | \
            jq -r '.Tags[]' | grep -P '^\d{2}$' | sort -V | tail -n 2 | \
            head -n 1)

          # Compare to base_image_tag from configuration.
          FEDORA_VERSION=${{ steps.load-config.outputs.base_image_tag }}
          if [ "$STABLE_MAJOR" -gt "$FEDORA_VERSION" ]; then
            echo "::warning:: The 'stable' image ($STABLE_VERSION) is newer than the configured FEDORA_VERSION ($FEDORA_VERSION)!"
            exit 1
          fi

      - id: generate-tags
        name: Generate Image Tags
        run: |
          set -euxo pipefail

          TIMESTAMP=$(date +%Y%m%d%H%M)
          BRANCH_NAME="${{ github.ref_name }}"
          FEDORA_VERSION=${{ steps.load-config.outputs.base_image_tag }}
          TAGS=()

          if [ "$BRANCH_NAME" = "main" ]; then
            TAGS+=("latest")
            TAGS+=("$FEDORA_VERSION.$TIMESTAMP")
            TAGS+=("$FEDORA_VERSION")
          else
            TAGS+=("$BRANCH_NAME")
            TAGS+=("$BRANCH_NAME-$FEDORA_VERSION.$TIMESTAMP")
            TAGS+=("$BRANCH_NAME-$FEDORA_VERSION")
          fi
          TAG_STRING="${TAGS[*]}"

          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "IMAGE_TAGS=$TAG_STRING" >> $GITHUB_OUTPUT
          echo "Generated Tags: $TAG_STRING"

      - id: define-image-metadata
        name: Define Image Metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ github.event.repository.name }}
          labels: |
            io.artifacthub.package.readme-url="https://${{ github.repository }}/blob/${{ github.ref_name }}/README.md"
            org.opencontainers.image.description="An image derived from Fedora CoreOS ${{ steps.load-config.outputs.base_image_tag }} for the ${{ github.event.repository.name }} project"
            org.opencontainers.image.source="https://github.com/${{ github.repository }}"
            org.opencontainers.image.title="${{ github.event.repository.name }}"
            org.opencontainers.image.version="${{ steps.load-config.outputs.base_image_tag }}.${{ steps.generate-tags.outputs.TIMESTAMP }}"

      - id: build-image
        name: Build Image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./core/Containerfile
          context: .
          image: ${{ github.event.repository.name }}
          tags: |
            ${{ steps.generate-tags.outputs.IMAGE_TAGS }}
          build-args: |
            BASE_IMAGE=${{ steps.load-config.outputs.base_image }}
            BASE_IMAGE_TAG=${{ steps.load-config.outputs.base_image_tag }}
            ROOT=core
          labels: ${{ steps.define-image-metadata.outputs.labels }}
          oci: false

      - id: push-to-registry
        name: Push to Registry
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
          extra-args: |
            --disable-content-trust

      - id: sign-image
        name: Sign Image
        run: |
          set -euxo pipefail

          # Sign the image digest.
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}@${{ steps.push-to-registry.outputs.digest }}